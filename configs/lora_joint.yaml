# LoRA fine-tuning configuration for Qwen 3.6 — joint training
#
# Trains on a merged dataset combining the bewerbungen extraction task and the
# docs Q&A task.  The model learns to handle both tasks depending on the system
# prompt it receives at inference time:
#
#   • Bewerbungen extraction:
#       system: "Du bist ein Assistent zur Analyse von Bewerbungsunterlagen..."
#       user:   <markdown CV text>
#
#   • Docs Q&A:
#       system: <DOCS_SYSTEM_PREAMBLE + document content>
#       user:   <question>
#
# Prepare the joint training file first:
#
#   python scripts/prepare_bewerbungen_dataset.py \
#       --bewerbungen-dir ~/bewerbungen \
#       --output data/bewerbungen_train.jsonl
#
#   python scripts/prepare_docs_dataset.py \
#       --docs-dir ~/docs \
#       --output data/docs_train.jsonl
#
#   python scripts/merge_datasets.py \
#       --inputs data/bewerbungen_train.jsonl data/docs_train.jsonl \
#       --output data/joint_train.jsonl \
#       --shuffle
#
# Build the joint eval file (merge eval splits from both datasets):
#
#   python scripts/prepare_bewerbungen_dataset.py \
#       --bewerbungen-dir ~/bewerbungen \
#       --output data/bewerbungen_train.jsonl \
#       --split 0.1
#
#   python scripts/prepare_docs_dataset.py \
#       --docs-dir ~/docs \
#       --output data/docs_train.jsonl \
#       --split 0.1
#
#   python scripts/merge_datasets.py \
#       --inputs data/bewerbungen_train_eval.jsonl data/docs_train_eval.jsonl \
#       --output data/joint_eval.jsonl \
#       --shuffle
#
# Omit the eval_file key below if you do not have an eval set.

model:
  name: "Qwen/Qwen2.5-VL-7B-Instruct"   # override on CLI: model.name=Qwen/Qwen3.6-27B
  load_in_4bit: false
  dtype: "bfloat16"
  max_seq_length: 8192

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_rslora: true
  use_gradient_checkpointing: "unsloth"

data:
  train_file: "data/joint_train.jsonl"
  eval_file: "data/joint_eval.jsonl"   # optional; omit key to skip eval
  dataset_format: "sharegpt"
  # informational — always ShareGPT; format is not validated by code
  max_samples: null

training:
  output_dir: "outputs/lora_joint"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 16
  warmup_ratio: 0.05
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  fp16: false
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 10
  eval_steps: 200
  save_steps: 100               # save a resumable checkpoint every N steps
  save_total_limit: 3           # keep only the last N checkpoints to save disk space
  # load_best_model_at_end: true  # keep checkpoint with lowest eval_loss; auto-aligns save_steps=eval_steps
  # early_stopping_patience: 3    # stop if eval_loss doesn't improve for N consecutive evals
  plot_every_steps: 50             # overwrite training_progress.png every N steps (0 = disable)
  report_to: "tensorboard"
  logging_dir: "outputs/lora_joint/runs"
  dataloader_num_workers: 4
  packing: true
  gradient_checkpointing: false   # handled by lora.use_gradient_checkpointing above
  seed: 42

export:
  merge_adapter: true
  merged_output_dir: "outputs/lora_joint_merged"
